[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    smoke: Kiểm tra nhanh các chức năng cốt lõi (chạy trước mỗi deploy)
    regression: Kiểm tra toàn bộ để đảm bảo không có lỗi hồi quy
    happy_path: Luồng nghiệp vụ bình thường (happy path)
    negative: Kiểm tra xử lý lỗi và input không hợp lệ
    edge: Kiểm tra biên và trường hợp đặc biệt
    security: Kiểm tra bảo mật (auth, injection, IDOR...)
    performance: Kiểm tra hiệu năng và response time
